<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1d2630"/>
      <stop offset="100%" stop-color="#0b0d10"/>
    </radialGradient>
    <radialGradient id="rim" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#dadde2"/>
      <stop offset="70%" stop-color="#6c7480"/>
      <stop offset="100%" stop-color="#2a2f37"/>
    </radialGradient>
  </defs>
  <!-- Background tile -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer tyre -->
  <circle cx="256" cy="256" r="200" fill="#0a0a0a"/>
  <!-- Tread marks -->
  <g stroke="#1a1a1a" stroke-width="10" fill="none">
    <g>
      <circle cx="256" cy="256" r="190" stroke-dasharray="6 22"/>
    </g>
  </g>
  <!-- Rim -->
  <circle cx="256" cy="256" r="140" fill="url(#rim)"/>
  <!-- Spokes (5) -->
  <g stroke="#3a4250" stroke-width="22" stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="130"/>
    <line x1="256" y1="256" x2="375" y2="216"/>
    <line x1="256" y1="256" x2="330" y2="350"/>
    <line x1="256" y1="256" x2="182" y2="350"/>
    <line x1="256" y1="256" x2="137" y2="216"/>
  </g>
  <!-- Hub -->
  <circle cx="256" cy="256" r="30" fill="#1a1a1a"/>
  <!-- Accent orange wrench -->
  <g transform="translate(360,360) rotate(35)" fill="#ff7a00">
    <rect x="-12" y="-60" width="24" height="120" rx="10"/>
    <circle cx="0" cy="-60" r="22"/>
    <circle cx="0" cy="-60" r="10" fill="#0b0d10"/>
  </g>
  <!-- Brand text -->
  <text x="256" y="478" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-weight="800" font-size="40" fill="#ff7a00" text-anchor="middle">TYRERUSH</text>
</svg>
